name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000

    env:
      DYNAMODB_ENDPOINT: http://localhost:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for DynamoDB Local
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
        run: |
          node --input-type=module -e "
          import { DynamoDBClient, ListTablesCommand } from '@aws-sdk/client-dynamodb';
          const client = new DynamoDBClient({
            endpoint: process.env.DYNAMODB_ENDPOINT,
            region: process.env.AWS_REGION,
            credentials: {
              accessKeyId: process.env.AWS_ACCESS_KEY_ID,
              secretAccessKey: process.env.AWS_SECRET_ACCESS_KEY,
            },
          });
          for (let attempt = 1; attempt <= 30; attempt += 1) {
            try {
              await client.send(new ListTablesCommand({}));
              console.log('DynamoDB Local is ready');
              process.exit(0);
            } catch (error) {
              console.log(\`Waiting for DynamoDB Local (attempt \${attempt}/30)\`);
              await new Promise((resolve) => setTimeout(resolve, 1000));
            }
          }
          console.error('DynamoDB Local did not become ready in time');
          process.exit(1);
          "

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run local E2E tests
        run: npm run test:e2e

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      AWS_REGION: us-east-1
      TF_VAR_aws_region: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Lambda
        run: npm run package:lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=url-shortener/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -input=false

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve -var="aws_region=${{ env.AWS_REGION }}"

      - name: Read API URL
        id: terraform
        working-directory: infra
        run: echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke tests (deployed API)
        env:
          BASE_URL: ${{ steps.terraform.outputs.api_url }}
        run: npm run test:smoke
